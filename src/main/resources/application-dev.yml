
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/payment_db
    username: payment_user
    password: payment_pass
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 60000
      idle-timeout: 600000
      pool-name: PaymentHikariPool
      connection-test-query: SELECT 1
      validation-timeout: 5000
      initialization-fail-timeout: -1  # Don't fail if DB is not available at startup
      
  jpa:
    hibernate:
      ddl-auto: update  # Changed from 'validate' to 'update' for development
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        show_sql: true
        format_sql: true
        
  flyway:
    enabled: false  # Disable Flyway initially to avoid startup failures
  
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true
        acks: all
        retries: 3
    consumer:
      group-id: payment-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 50
          max-idle: 10
          min-idle: 5
          
payment:
  outbox:
    batch-size: 100
    threads: 20
  limits:
    min-amount: 0.01
    max-amount: 10000
    daily-limit: 50000
    
resilience4j:
  retry:
    instances:
      payment-retry:
        max-attempts: 3
        wait-duration: 100ms
        retry-exceptions:
          - org.springframework.dao.OptimisticLockingFailureException

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    com.payment: DEBUG
    com.zaxxer.hikari: INFO
    org.springframework.boot.autoconfigure: INFO
    org.springframework.web: INFO